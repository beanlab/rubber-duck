sql:
  db_type: sqlite
  database: rubber_duck_teams.db  # separate DB from Discord

containers: {}

tools: {}

ducks:
  teams-rubber-duck:
    duck_type: user_led_conversation
    settings:
      introduction: >
        I'm a teams bot, I will always answer using [TeamsBot]'
      agent:
        name: RubberDuck
        prompt_files:
          - prompts/teams.txt
        engine: gpt-5-mini
        reasoning: minimal
        tools:
          - talk_to_user
          - conclude_conversation

servers:
  MyTeamsServer:
    server_id: "placeholder"
    channels:
      rubber-duck-channel:
        # Nic
