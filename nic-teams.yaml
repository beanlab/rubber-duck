        # Tyler
        channel_id: "a:17EtLZwud2hqAxLDOGmIQLIjMKCmyy0kBGqN7E1dgVuOrWX_iM3xT_SJME5ffzcE24Sh0SQFB4tmSMrwDi04Zd9EstTOgEeDgu6AuYnFmtLooLTfHuiZOiagqPHpKEkQq"
        timeout: 600
